<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>로그인 - 우리집 스마트 허브</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-sub: #64748b;
            --radius: 24px;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-sub);
            margin-bottom: 30px;
            font-size: 15px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        .links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 14px;
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        #message {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
        }

        .error { color: #ef4444; }
        .success { color: #10b981; }

        .loading-spinner {
            display: none;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">Smart Hub</div>
        <p>우리집 전용 허브에 로그인하세요</p>

        <form id="login-form">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="이메일" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="비밀번호" required>
            </div>
            <button type="submit" id="submit-btn">
                <i class="fas fa-spinner fa-spin loading-spinner" id="spinner"></i>
                로그인
            </button>
        </form>

        <div id="message"></div>

        <div class="links">
            <a href="#" id="signup-link">계정 만들기</a>
            <span>|</span>
            <a href="#">비밀번호 찾기</a>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
        const form = document.getElementById('login-form');
        const messageEl = document.getElementById('message');
        const spinner = document.getElementById('spinner');
        const submitBtn = document.getElementById('submit-btn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            spinner.style.display = 'inline-block';
            submitBtn.disabled = true;
            messageEl.innerText = '';

            const { data, error } = await _supabase.auth.signInWithPassword({
                email,
                password,
            });

            if (error) {
                messageEl.innerText = '로그인 실패: ' + error.message;
                messageEl.className = 'error';
                spinner.style.display = 'none';
                submitBtn.disabled = false;
            } else {
                messageEl.innerText = '로그인 성공! 이동 중...';
                messageEl.className = 'success';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        };

        document.getElementById('signup-link').onclick = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert('이메일과 비밀번호를 입력해주세요.');
                return;
            }

            if (confirm('이 정보로 새 계정을 생성하시겠습니까?')) {
                const { data, error } = await _supabase.auth.signUp({
                    email,
                    password,
                });

                if (error) {
                    alert('가입 실패: ' + error.message);
                } else {
                    alert('가입되었습니다! 이메일을 확인하거나 로그인을 시도하세요.');
                }
            }
        };

        // 이미 로그인된 경우 처리
        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        checkSession();
    </script>
</body>
</html>
