<!DOCTYPE html>
<html lang="ko" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리집 스마트 허브</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js?v=1.1.0"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-sub: #64748b;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --radius: 24px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-sub: #94a3b8;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.4s, color 0.4s;
        }

        /* 모바일 최적화 컨테이너 */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 25px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-size: 26px;
            line-height: 1.3;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s, background 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border, rgba(0, 0, 0, 0.03));
            text-decoration: none;
            color: inherit;
        }

        .card:active {
            transform: scale(0.97);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: rgba(99, 102, 241, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--primary);
        }

        .card h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .summary-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 11px;
            color: var(--text-sub);
            font-weight: 700;
        }

        .value {
            font-size: 15px;
            font-weight: 800;
        }

        .value.plus {
            color: #2ecc71;
        }

        .value.minus {
            color: #e74c3c;
        }

        .value.savings {
            color: #1abc9c;
        }

        .value.highlight {
            color: var(--accent-green);
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            margin-top: 15px;
        }

        #theme-toggle {
            background: var(--card-bg);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            box-shadow: var(--shadow);
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.3s, transform 0.2s;
        }

        #theme-toggle:active {
            transform: scale(0.9);
        }

        @media (max-width: 600px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">Smart Home Hub</div>
            <button id="theme-toggle"><i class="fas fa-moon"></i></button>
        </header>

        <div class="welcome-container" style="margin-bottom: 40px;">
            <h1 style="font-size: 24px; margin-bottom: 10px; opacity: 0.8;">안녕하세요!</h1>
            <div id="quote-display" style="font-size: 20px; font-weight: 700; line-height: 1.4; color: var(--text);">
                <!-- 명언이 여기에 표시됩니다 -->
                오늘도 행복한 하루 되세요.
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- 가계부 카드 -->
            <a href="accountbook/index.html" class="card">
                <div class="card-header">
                    <div class="card-icon"><i class="fas fa-wallet"></i></div>
                    <h2>우리집 가계부</h2>
                </div>
                <div class="summary-box">
                    <div class="summary-item">
                        <span class="label">수입</span>
                        <span id="income-value" class="value plus">0원</span>
                    </div>
                    <div class="summary-item">
                        <span class="label">저축</span>
                        <span id="savings-value" class="value savings">0원</span>
                    </div>
                    <div class="summary-item">
                        <span class="label">지출</span>
                        <span id="expense-value" class="value minus">0원</span>
                    </div>
                </div>
                <div id="account-status" class="status-badge" style="display:none;">⚠️ 지출이 많습니다!</div>
                <div id="account-message"
                    style="margin-top: 15px; font-size: 14px; color: var(--text-sub); line-height: 1.6;">
                    가계부를 분석 중입니다...
                </div>
            </a>

            <!-- 편의점관리 카드 -->
            <a href="inventory/index.html" class="card">
                <div class="card-header">
                    <div class="card-icon"><i class="fas fa-store"></i></div>
                    <h2>우리집 편의점</h2>
                </div>
                <div class="summary-box">
                    <div class="summary-item" style="grid-column: span 2;">
                        <span class="label">부족한 물품</span>
                        <span id="low-stock-count" class="value minus">0건</span>
                    </div>
                </div>
                <div id="stock-list-preview"
                    style="margin-top: 15px; font-size: 14px; color: var(--text-sub); line-height: 1.6;">
                    로딩 중...
                </div>
            </a>

            <!-- 로또 카드 -->
            <a href="lotto/index.html" class="card">
                <div class="card-header">
                    <div class="card-icon" style="background: rgba(239, 68, 68, 0.15); font-size: 26px;">🧧</div>
                    <h2>우리집 복권방</h2>
                </div>
                <div class="summary-box">
                    <div class="summary-item">
                        <span class="label">등록된 게임</span>
                        <span id="lotto-game-count" class="value">0개</span>
                    </div>
                    <div class="summary-item">
                        <span class="label">당첨된 게임</span>
                        <span id="lotto-win-count" class="value highlight">0개</span>
                    </div>
                </div>
                <div id="lotto-preview-message"
                    style="margin-top: 15px; font-size: 14px; color: var(--text-sub); line-height: 1.6;">
                    이번 주 주인공은 나야 나! 🍀
                </div>
            </a>
        </div>
    </div>

            "휴식은 더 멀리 가기 위한 준비입니다. 🛌",

            "당신은 오늘 하루도 정말 잘해낼 거예요! 👏",
            "행복한 가정은 미리 맛보는 천국입니다. 🏠",

        function displayQuote() {
            const randomIndex = Math.floor(Math.random() * QUOTES.length);
            const quoteDisplay = document.getElementById('quote-display');
            if (quoteDisplay) {
                quoteDisplay.innerText = QUOTES[randomIndex];
            }
        }

        // 테마 관리
        const themeBtn = document.getElementById('theme-toggle');
        function initTheme() {
            const theme = localStorage.getItem('hub-theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            themeBtn.querySelector('i').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        themeBtn.onclick = () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('hub-theme', next);
            initTheme();
        };
        initTheme();

        let dashboardPrevValues = { income: 0, expense: 0, stock: 0, savings: 0, lotto: 0, lottoWin: 0 };

        function animateCount(elementId, start, end) {
            const obj = document.getElementById(elementId);
            if (!obj) return;
            
            // NaN 방지: 숫자가 아닐 경우 0으로 취급
            const startVal = isNaN(start) ? 0 : Number(start);
            const endVal = isNaN(end) ? 0 : Number(end);
            
            const duration = 800;
            const startTime = performance.now();
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(2, -10 * progress);
                const current = Math.floor(startVal + (endVal - startVal) * easeProgress);

                if (elementId === 'low-stock-count') {
                    obj.innerText = `${current}건`;
                } else if (elementId === 'lotto-game-count' || elementId === 'lotto-win-count') {
                    obj.innerText = `${current}개`;
                } else {
                    obj.innerText = `${current.toLocaleString()}원`;
                }

                if (progress < 1) requestAnimationFrame(update);
                else {
                    if (elementId === 'low-stock-count') obj.innerText = `${endVal}건`;
                    else if (elementId === 'lotto-game-count' || elementId === 'lotto-win-count') obj.innerText = `${endVal}개`;
                    else obj.innerText = `${endVal.toLocaleString()}원`;
                }
            }
            requestAnimationFrame(update);
        }

        // 데이터 대시보드 업데이트
        async function updateDashboard() {
            try {
                // 1. 편의점 상품 조회
                const { data: invData } = await _supabase.from('inventory').select('name, count, min_count, category');
                const lowStockItems = invData?.filter(i => i.count <= i.min_count) || [];
                const totalItems = invData?.length || 0;
                const foodItems = invData?.filter(i => i.category === '식품').length || 0;
                const dailyItems = invData?.filter(i => i.category === '생필품').length || 0;

                const stockPreview = document.getElementById('stock-list-preview');
                if (lowStockItems.length > 0) {
                    stockPreview.innerHTML = `<span style="color:#e74c3c">비상! ${lowStockItems.slice(0, 2).map(i => i.name).join(', ')} 매대가 비어가고 있어요! 🏃‍♂️💨</span>`;
                } else if (totalItems === 0) {
                    stockPreview.innerText = '매대가 텅 비었네요. 새로운 상품들로 채워볼까요? 🛒';
                } else if (totalItems > 15) {
                    stockPreview.innerText = '매대가 든든하네요! 진정한 우리집 편의점 완성! 🏪✨';
                } else if (foodItems > dailyItems && foodItems > 5) {
                    stockPreview.innerText = '맛있는 간식 가득! 오늘 야식은 편의점 털기인가요? 🍕🎉';
                } else if (dailyItems > 5) {
                    stockPreview.innerText = '생필품 완비! 24시간 언제든 끄떡없는 우리집 편의점 🛡️';
                } else {
                    stockPreview.innerText = '모든 물품이 충분합니다. 완벽한 진열 상태예요! 👌';
                }

                // 2. 가계부 데이터 조회 (현재 월 기준)
                const now = new Date();
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();

                try {
                    const { data: accData } = await _supabase
                        .from('account_book')
                        .select('amount, type, category')
                        .gte('date', startOfMonth);

                    let income = 0;
                    let savings = 0;
                    let consumption = 0;

                    accData?.forEach(item => {
                        if (item.type === 'income') {
                            income += item.amount;
                        } else {
                            if (item.category === '저축/예금') {
                                savings += item.amount;
                            } else {
                                consumption += item.amount;
                            }
                        }
                    });

                    // 애니메이션 실행
                    animateCount('income-value', dashboardPrevValues.income, income);
                    animateCount('savings-value', dashboardPrevValues.savings, savings);
                    animateCount('expense-value', dashboardPrevValues.expense, consumption);
                    animateCount('low-stock-count', dashboardPrevValues.stock, lowStockItems.length);

                    // 값 저장
                    dashboardPrevValues = { income, expense: consumption, stock: lowStockItems.length, savings };

                    // 맞춤형 메시지 생성
                    const messageEl = document.getElementById('account-message');
                    if (income === 0 && consumption === 0 && savings === 0) {
                        messageEl.innerText = '이번 달 가계부 작성을 시작해 볼까요? ✨';
                    } else if (consumption > income && income > 0) {
                        messageEl.innerHTML = '<span style="color:#e74c3c">지출이 수입을 초과했습니다. 지갑을 지켜주세요! 🚨</span>';
                        document.getElementById('account-status').style.display = 'inline-flex';
                    } else if (savings > consumption) {
                        messageEl.innerText = '소비보다 저축을 더 많이 하셨네요! 정말 멋진 경제 습관입니다! 🏆';
                        document.getElementById('account-status').style.display = 'none';
                    } else if (savings > 0) {
                        messageEl.innerText = '자산이 무럭무럭 자라고 있어요! 저축하는 당신이 아름답습니다! 💰';
                        document.getElementById('account-status').style.display = 'none';
                    } else if (income > consumption) {
                        messageEl.innerText = '자금 흐름이 원활합니다. 계획적인 소비를 응원해요! ☕';
                        document.getElementById('account-status').style.display = 'none';
                    } else {
                        messageEl.innerText = '가계부 기록을 통해 더 똑똑한 부자가 되어보세요! 📈';
                        document.getElementById('account-status').style.display = 'none';
                    }
                } catch (e) {
                    console.error('Account data fetch error:', e);
                }

                // 3. 로또 데이터 조회 (Supabase 연동)
                const { data: lottoData, error: lottoError } = await _supabase
                    .from('lotto_tickets')
                    .select('*');
                
                const winningNumbersCache = JSON.parse(localStorage.getItem('winningNumbersCache')) || {};
                let totalLottoGames = 0;
                let winningLottoGames = 0;
                
                if (!lottoError && Array.isArray(lottoData)) {
                    lottoData.forEach(t => {
                        const winInfo = winningNumbersCache[t.round];
                        if (t && t.games && Array.isArray(t.games)) {
                            totalLottoGames += t.games.length;
                            
                            // 당첨 여부 확인
                            if (winInfo) {
                                t.games.forEach(game => {
                                    const matchCount = game.filter(n => winInfo.numbers.includes(n)).length;
                                    if (matchCount >= 3) winningLottoGames++;
                                });
                            }
                        }
                    });
                } else if (lottoError) {
                    // DB 실패 시 로컬 스토리지 백업 사용
                    const localData = JSON.parse(localStorage.getItem('myLottoData')) || [];
                    localData.forEach(t => { totalLottoGames += t.games.length; });
                }
                
                animateCount('lotto-game-count', dashboardPrevValues.lotto, totalLottoGames);
                animateCount('lotto-win-count', dashboardPrevValues.lottoWin, winningLottoGames);
                
                const lottoMsg = document.getElementById('lotto-preview-message');
                if (winningLottoGames > 0) {
                    lottoMsg.innerHTML = `<span style="color:var(--accent-green); font-weight:bold;">축하합니다! ${winningLottoGames}개의 게임이 당첨되었어요! 🎊</span>`;
                } else {
                    const luckyMessages = [
                        "이번 주 1등의 주인공은 바로 당신입니다! 🏆",
                        "당신에게 곧 눈부신 행운이 쏟아질 거예요. ✨",
                        "오늘따라 당신의 미소에서 대박의 기운이 느껴지네요! 😊",
                        "우주의 기운이 당신의 번호들로 모이고 있습니다. 🌌",
                        "포기하지 마세요, 행운은 예고 없이 찾아오니까요! 🍀",
                        "이미 당신은 충분히 행복할 자격이 있는 사람입니다. ❤️",
                        "황금빛 미래가 당신을 향해 성큼성큼 다가오고 있어요. 💰",
                        "기분 좋은 예감이 드네요! 오늘 하루도 화이팅! 🌈",
                        "당신의 끈기가 마침내 커다란 결실을 맺을 시간입니다. 🍎",
                        "이번 주엔 정말 좋은 일이 생길 것만 같아요! 🧧",
                        "복권 명당의 기운을 담아 당신의 당첨을 응원합니다! 🏛️",
                        "당신의 꿈이 현실이 되는 그날까지 함께할게요. 🌟",
                        "간절히 바라면 온 우주가 당신을 도와줄 거예요. 🔭",
                        "오늘 스캔한 그 번호가 당신의 인생을 바꿀지도 몰라요! 🚀",
                        "행운의 여신이 당신의 어깨 위에 살포시 앉아 있네요. 🧚",
                        "작은 희망이 모여 거대한 기적이 됩니다. 🌱",
                        "당신은 세상에서 가장 운이 좋은 사람입니다! 💎",
                        "설레는 마음으로 이번 주 추첨을 기다려봐요! 🎈",
                        "이미 당신 곁에는 수많은 행운이 머물고 있습니다. 🌼",
                        "빛나는 1등 당첨금이 당신의 통장을 기다리고 있어요! 🏦",
                        "오늘도 행운 가득, 웃음 가득한 하루 되세요! 😄"
                    ];
                    const randomIdx = Math.floor(Math.random() * luckyMessages.length);
                    lottoMsg.innerText = luckyMessages[randomIdx];
                }

                dashboardPrevValues.lotto = totalLottoGames;
                dashboardPrevValues.lottoWin = winningLottoGames;

            } catch (e) {
                console.error('Dashboard load failed:', e);
            }
        }

        displayQuote();
        updateDashboard();

        // 뒤로 가기 등으로 페이지가 다시 나타날 때 데이터 갱신
        window.addEventListener('pageshow', (event) => {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                updateDashboard();
            }
        });

        // 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</body>

</html>
